services:
  whatasimpledash:
    image: leraptor65/whatasimpledash:latest
    container_name: whatasimpledash
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
    volumes:
      - ./config:/app/config
      - ./public/icons:/app/public/icons
      - ./public/backgrounds:/app/public/backgrounds
      - ./public/uploads:/app/public/uploads
